services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SERVE_FRONTEND=true
      - DATABASE_URL=sqlite+aiosqlite:////app/backend/api/data/app.db
      - ALLOW_ORIGINS=["*"]
    volumes:
      - duplex0r-data:/app/backend/api/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  duplex0r-data:
