  <!-- Back document (teal) -->
  <rect x="8" y="4" width="16" height="20" rx="2" fill="url(#teal)" opacity="0.9"/>
  <rect x="11" y="8" width="10" height="1.5" rx="0.75" fill="white" opacity="0.6"/>
